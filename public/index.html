<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:    #ff2020;
            --red2:   #ff5252;
            --bg:     #0a0a0a;
            --card:   #141414;
            --border: #222;
            --text:   #f0f0f0;
            --muted:  #666;
            --blue:   #3b9eff;
            --green:  #22c97a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.2rem;
            letter-spacing: 0.04em;
            line-height: 1;
            margin-bottom: 2.5rem;
            position: relative; z-index: 1;
        }
        .logo span { color: var(--red); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            position: relative; z-index: 1;
        }

        .input-row {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        input[type="text"] {
            flex: 1;
            background: #0f0f0f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]::placeholder { color: var(--muted); }
        input[type="text"]:focus { border-color: var(--red); }

        .btn-fetch {
            background: var(--red);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.05rem;
            letter-spacing: 0.06em;
            padding: 0.75rem 1.4rem;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-fetch:hover  { background: var(--red2); }
        .btn-fetch:active { transform: scale(0.97); }
        .btn-fetch:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

        .quality-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .quality-label {
            font-size: 0.8rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .quality-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .pill {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.3rem 0.65rem;
            transition: all 0.15s;
            user-select: none;
        }
        .pill:hover   { border-color: #444; color: var(--text); }
        .pill.active  { background: var(--red); border-color: var(--red); color: #fff; }

        .spinner {
            display: none;
            width: 28px; height: 28px;
            border: 3px solid #222;
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            display: none;
            background: #1f0a0a;
            border: 1px solid #4d1010;
            border-radius: 10px;
            color: #ff6b6b;
            font-size: 0.88rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }

        #result { display: none; }

        .thumb-wrap {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
            background: #000;
            aspect-ratio: 16/9;
        }
        .thumb-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .duration-badge {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.82);
            border-radius: 4px;
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 2px 6px;
        }

        .meta { margin-bottom: 1.2rem; }
        .meta-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .meta-sub {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .meta-sub span { display: flex; align-items: center; gap: 0.3rem; }

        .dl-row {
            display: flex;
            gap: 0.6rem;
        }
        .btn-dl {
            flex: 1;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            text-align: center;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn-dl:active { transform: scale(0.97); }
        .btn-dl:hover  { opacity: 0.85; }
        .btn-dl.video  { background: var(--blue); }
        .btn-dl.audio  { background: var(--green); }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.4rem 0;
        }
    </style>
</head>
<body>

<div class="logo">YT <span>DOWN</span></div>

<div class="card">

    <div class="input-row">
        <input type="text" id="url-input" placeholder="Paste a YouTube link…" autocomplete="off"
               onkeydown="if(event.key==='Enter') fetchInfo()">
        <button class="btn-fetch" id="btn-fetch" onclick="fetchInfo()">GET</button>
    </div>

    <div class="quality-row">
        <span class="quality-label">Quality:</span>
        <div class="quality-pills" id="quality-pills">
            <span class="pill" data-q="144p">144p</span>
            <span class="pill" data-q="240p">240p</span>
            <span class="pill active" data-q="360p">360p</span>
            <span class="pill" data-q="480p">480p</span>
            <span class="pill" data-q="720p">720p</span>
            <span class="pill" data-q="1080p">1080p</span>
        </div>
    </div>

    <div class="spinner" id="spinner"></div>

    <div class="error" id="error"></div>

    <div id="result">
        <div class="thumb-wrap">
            <img id="thumb" src="" alt="thumbnail">
            <span class="duration-badge" id="duration"></span>
        </div>

        <div class="meta">
            <div class="meta-title" id="title"></div>
            <div class="meta-sub">
                <span>👤 <span id="author"></span></span>
                <span>👁 <span id="views"></span></span>
                <span>👍 <span id="likes"></span></span>
            </div>
        </div>

        <div class="dl-row">
            <a id="btn-video" class="btn-dl video" href="#" target="_blank">
                🎥 Download Video
            </a>
            <a id="btn-audio" class="btn-dl audio" href="#" target="_blank">
                🎵 Download Audio
            </a>
        </div>
    </div>

</div>

<script>
    const API = '';
    let selectedQuality = '360p';

    document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            selectedQuality = pill.dataset.q;
            const vid = document.getElementById('btn-video');
            if (vid.dataset.base) {
                vid.href = `${vid.dataset.base}&quality=${selectedQuality}`;
            }
        });
    });

    async function fetchInfo() {
        const raw = document.getElementById('url-input').value.trim();
        if (!raw) { showError('Paste a YouTube URL first.'); return; }

        setLoading(true);
        hideError();
        document.getElementById('result').style.display = 'none';

        try {
            const res  = await fetch(`${API}/api/info?url=${encodeURIComponent(raw)}`);
            const json = await res.json();

            if (!json.success) {
                showError(json.message || 'Failed to fetch video info.');
                return;
            }

            renderResult(json.data, raw);

        } catch (e) {
            showError('Could not reach the API. Is the server running?');
        } finally {
            setLoading(false);
        }
    }

    function renderResult(data, rawUrl) {
        const enc = encodeURIComponent(rawUrl);

        const thumb = document.getElementById('thumb');
        thumb.onerror = () => { thumb.src = data.thumbnails.high; };
        thumb.src = data.thumbnails.maxres;

        document.getElementById('duration').textContent = data.duration;
        document.getElementById('title').textContent    = data.title;
        document.getElementById('author').textContent   = data.author  || '—';
        document.getElementById('views').textContent    = data.viewCount;
        document.getElementById('likes').textContent    = data.likeCount;

        const videoBase = `${API}/api/download/video?url=${enc}`;
        const btnVideo  = document.getElementById('btn-video');
        btnVideo.dataset.base = videoBase;
        btnVideo.href         = `${videoBase}&quality=${selectedQuality}`;

        document.getElementById('btn-audio').href = `${API}/api/download/audio?url=${enc}`;

        document.getElementById('result').style.display = 'block';
    }

    function setLoading(on) {
        document.getElementById('spinner').style.display  = on ? 'block' : 'none';
        document.getElementById('btn-fetch').disabled     = on;
    }

    function showError(msg) {
        const el = document.getElementById('error');
        el.textContent    = msg;
        el.style.display  = 'block';
    }

    function hideError() {
        document.getElementById('error').style.display = 'none';
    }
</script>
</body>
</html>
